<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">

        <div class="container">

            <div class="header-content">

                <h2 data-lang="cartTitle">Shopping Cart</h2>

                <button class="back-btn" data-lang="backButton">
                    ← Back
                </button>

            </div>

        </div>

    </header>

    <section class="cart-page">

        <div class="container">

            <div id="cart-items"></div>
            <h2 id="cart-total"></h2>

            <div class="cart-actions">

                <button id="clear-cart" data-lang="clearCart">
                    Clear Cart
                </button>

            </div>

        </div>

    </section>


    <script src="js/language.js"></script>
    <script src="js/cart.js"></script>

</body>

</html>
